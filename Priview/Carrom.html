<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Carrom 3D | by MMN-Codes</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --wood-frame: #3d2314;
            --wood-light: #5c3a21;
            --board-surface: #f4e7c3;
            --gold: #FFD700;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at center, #1e3a8a 0%, #050b14 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white; touch-action: none;
        }

        /* --- UI Overlay --- */
        .ui-top {
            position: absolute; top: 15px; width: 100%; max-width: 600px;
            display: flex; justify-content: space-between; padding: 0 20px;
            z-index: 10; pointer-events: none;
        }

        .player-badge {
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 8px 15px; border-radius: 30px;
            display: flex; align-items: center; gap: 12px;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            opacity: 0.5;
        }
        
        .player-badge.active {
            opacity: 1;
            border-color: rgba(255, 215, 0, 0.6);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4), inset 0 0 10px rgba(255,255,255,0.1);
            transform: scale(1.08);
        }

        .avatar {
            width: 45px; height: 45px; border-radius: 50%; 
            border: 2px solid white; overflow: hidden; background: #222;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .score-box { text-align: right; }
        .score-val { font-size: 24px; font-weight: 900; color: var(--gold); text-shadow: 0 2px 4px rgba(0,0,0,0.5); line-height: 1; }
        .score-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #ddd; letter-spacing: 1px; }

        /* --- Game Board --- */
        #game-container {
            position: relative;
            border: 22px solid var(--wood-frame);
            border-radius: 35px;
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,0.9),
                0 25px 50px rgba(0,0,0,0.7),
                0 0 0 6px #1a0f08;
            width: 95vw; height: 95vw;
            max-width: 550px; max-height: 550px;
            background: radial-gradient(circle at center, var(--board-surface) 0%, #e0ce9a 100%);
            overflow: hidden;
            z-index: 1;
        }

        canvas { display: block; width: 100%; height: 100%; cursor: grab; }
        canvas:active { cursor: grabbing; }

        /* --- Menus --- */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: fadeIn 0.4s ease;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 25px; text-align: center; width: 340px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.05);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.8) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        .menu-card h1 { 
            margin: 0 0 5px; font-size: 38px; font-weight: 900;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-transform: uppercase; letter-spacing: 3px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }
        
        .menu-subtitle {
            color: #ddd; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px;
            font-size: 13px; font-weight: 600; display: inline-block; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            border: 1px solid rgba(255,255,255,0.2); color: white; padding: 16px;
            font-size: 16px; font-weight: bold; border-radius: 15px; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; margin-bottom: 12px; width: 100%;
            transition: all 0.2s ease; position: relative; overflow: hidden;
        }
        .btn-cpu { background: linear-gradient(135deg, #005c97, #363795); box-shadow: 0 6px 15px rgba(0,92,151,0.4); }
        .btn-pvp { background: linear-gradient(135deg, #11998e, #38ef7d); box-shadow: 0 6px 15px rgba(17,153,142,0.4); }
        .btn:active { transform: translateY(4px) scale(0.98); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        #game-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            color: white; padding: 12px 30px; border-radius: 50px;
            font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            pointer-events: none; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50; white-space: nowrap; border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.3);
        }

        .controls-hint {
            margin-top: 25px; font-size: 14px; font-weight: 600; color: #ccc;
            background: var(--glass-bg); backdrop-filter: blur(5px);
            padding: 10px 25px; border-radius: 25px; border: 1px solid var(--glass-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* --- Branding --- */
        .branding {
            position: absolute; bottom: 15px; width: 100%; text-align: center;
            font-size: 13px; font-weight: 600; letter-spacing: 2px;
            color: rgba(255,255,255,0.6); text-transform: uppercase; z-index: 100;
        }
        .branding a { color: inherit; text-decoration: none; transition: color 0.3s; }
        .branding a:hover { color: #fff; }
        .branding span { color: var(--gold); text-shadow: 0 0 8px rgba(255,215,0,0.6); font-weight: 900; }
    </style>
</head>
<body>

    <!-- Start Menu -->
    <div id="menu-overlay">
        <div class="menu-card">
            <h1>Carrom 3D</h1>
            <div class="menu-subtitle">★ Premium Edition ★</div>
            <div style="font-size: 13px; color: #ddd; margin-bottom: 25px; text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
                <b>How to Play:</b><br>
                👆 <b>Drag</b> striker left/right to position.<br>
                🏹 <b>Pull Back</b> (downwards/upwards) to aim & power.<br>
                ✨ <b>Release</b> to shoot! (Queen = 50pts)
            </div>
            <h2 id="end-title" style="display:none; color: var(--gold); margin-bottom: 15px; font-size: 24px;"></h2>
            <button class="btn btn-cpu" onclick="startGame('CPU')">🤖 1 Player vs CPU</button>
            <button class="btn btn-pvp" onclick="startGame('PVP')">👥 Pass & Play (2P)</button>
        </div>
    </div>

    <!-- Top UI -->
    <div class="ui-top">
        <div class="player-badge active" id="p1-badge">
            <div class="avatar"><div id="av1" style="width:100%;height:100%;background:url('https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=b6e3f4');background-size:cover;"></div></div>
            <div class="score-box">
                <div class="score-label" id="name-p1">Player 1</div>
                <div class="score-val" id="score-p1">0</div>
            </div>
        </div>
        <div class="player-badge" id="p2-badge">
            <div class="score-box" style="text-align:left;">
                <div class="score-label" id="name-p2">CPU</div>
                <div class="score-val" id="score-p2">0</div>
            </div>
            <div class="avatar"><div id="av2" style="width:100%;height:100%;background:url('https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka&backgroundColor=ffdfbf');background-size:cover;"></div></div>
        </div>
    </div>

    <!-- Game Container -->
    <div id="game-container">
        <canvas id="carromCanvas"></canvas>
        <div id="game-message">FOUL!</div>
    </div>

    <div class="controls-hint">Drag striker • Pull back to shoot</div>

    <!-- Branding -->
    <div class="branding">
        <a href="https://mmn-codes.vercel.app/" target="_blank">Made by <span>MMN-Codes</span></a>
    </div>

<script>
    // --- Web Audio API (Premium Synthesizer) ---
    const sfx = {
        ctx: null,
        init() {
            if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playTone(freq, type, duration, vol=0.1) {
            if (!this.ctx) return;
            try {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            } catch(e) {}
        },
        strike() { this.playTone(120, 'triangle', 0.15, 0.4); },
        hit(vel) {
            let v = Math.min(vel / 15, 0.3);
            if (v > 0.05) this.playTone(600 + Math.random()*200, 'sine', 0.05, v);
        },
        pocket() { 
            this.playTone(523.25, 'sine', 0.1, 0.2); 
            setTimeout(() => this.playTone(659.25, 'sine', 0.2, 0.2), 100); 
        },
        foul() { 
            this.playTone(200, 'sawtooth', 0.2, 0.3); 
            setTimeout(() => this.playTone(150, 'sawtooth', 0.3, 0.3), 150); 
        },
        win() {
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                setTimeout(() => this.playTone(freq, 'sine', 0.4, 0.3), i * 200);
            });
        }
    };

    const canvas = document.getElementById('carromCanvas');
    const ctx = canvas.getContext('2d');
    const msgEl = document.getElementById('game-message');

    // --- Game Config ---
    let BOARD_SIZE = 600; 
    let SCALE = 1;
    
    const FRICTION = 0.985; 
    const WALL_DAMPING = 0.6; 
    const SUB_STEPS = 5; 
    
    const STRIKER_RADIUS = 20; 
    const PIECE_RADIUS = 14; 
    const POCKET_RADIUS = 30;
    const MAX_POWER = 45;

    const COLORS = {
        board: '#f4e7c3',
        lines: '#3a2515',
        pocket: '#1a0f08',
        aimP1: '#39ff14',
        aimP2: '#ff4444'
    };

    // --- State ---
    let gameState = 'MENU';
    let gameMode = 'CPU'; // 'CPU' or 'PVP'
    let turn = 'P1';      // 'P1' or 'P2'
    let pieces = [];
    
    let striker = { 
        x: 0, y: 0, vx: 0, vy: 0, 
        radius: STRIKER_RADIUS, mass: 4, 
        isStriker: true, dragging: false, visible: true
    };
    
    let dragStart = null;
    let dragCurrent = null;
    let scores = { p1: 0, p2: 0 };
    let foulCommitted = false;
    let collisionCooldown = 0; // Prevent overlapping sound glitches

    // --- Resize Logic ---
    function resize() {
        const container = document.getElementById('game-container');
        const size = container.clientWidth; 
        canvas.width = size;
        canvas.height = size;
        BOARD_SIZE = size;
        SCALE = size / 600;
        
        striker.radius = STRIKER_RADIUS * SCALE;
        pieces.forEach(p => p.radius = PIECE_RADIUS * SCALE);
        
        if (gameState === 'AIMING') {
             striker.y = (turn === 'P1') ? canvas.height - (90 * SCALE) : (90 * SCALE);
        }
    }
    window.addEventListener('resize', () => { resize(); draw(); });

    // --- Initialization ---
    function createPiece(x, y, type) {
        return { x, y, vx: 0, vy: 0, radius: PIECE_RADIUS * SCALE, type, mass: 1 };
    }

    function initGame() {
        resize();
        pieces = [];
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const r = PIECE_RADIUS * SCALE * 2.05;

        pieces.push(createPiece(cx, cy, 'red'));

        for(let i=0; i<6; i++) {
            const angle = i * 60 * Math.PI / 180;
            const type = (i % 2 !== 0) ? 'white' : 'black'; 
            pieces.push(createPiece(cx + Math.cos(angle)*r, cy + Math.sin(angle)*r, type));
        }

        const r2 = r * 1.95; 
        for(let i=0; i<12; i++) {
            const angle = (i * 30 + 15) * Math.PI / 180;
            const type = (i % 2 === 0) ? 'white' : 'black';
            pieces.push(createPiece(cx + Math.cos(angle)*r2, cy + Math.sin(angle)*r2, type));
        }

        scores = { p1: 0, p2: 0 };
        turn = 'P1';
        resetStriker();
        updateUI();
    }

    function resetStriker() {
        striker.vx = 0; striker.vy = 0;
        striker.visible = true;
        striker.dragging = false;
        foulCommitted = false;

        striker.x = canvas.width / 2;
        striker.y = (turn === 'P1') ? canvas.height - (90 * SCALE) : (90 * SCALE);

        gameState = 'AIMING';
        updateUI();

        if(gameMode === 'CPU' && turn === 'P2') {
            setTimeout(cpuTurn, 1000);
        }
    }

    function startGame(mode) {
        sfx.init();
        gameMode = mode;
        
        document.getElementById('name-p1').innerText = "Player 1";
        if(mode === 'CPU') {
            document.getElementById('name-p2').innerText = "CPU";
            document.getElementById('av2').style.backgroundImage = "url('https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka&backgroundColor=ffdfbf')";
        } else {
            document.getElementById('name-p2').innerText = "Player 2";
            document.getElementById('av2').style.backgroundImage = "url('https://api.dicebear.com/7.x/avataaars/svg?seed=Jack&backgroundColor=ffdfbf')";
        }

        document.getElementById('menu-overlay').style.display = 'none';
        initGame();
        requestAnimationFrame(gameLoop);
    }

    // --- Input Handling ---
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('touchstart', startDrag, {passive: false});
    canvas.addEventListener('mousemove', moveDrag);
    canvas.addEventListener('touchmove', moveDrag, {passive: false});
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    function startDrag(e) {
        if(gameState !== 'AIMING') return;
        if(gameMode === 'CPU' && turn === 'P2') return; // CPU turn
        
        sfx.init(); // ensure audio unlock
        const pos = getPos(e);
        if (Math.hypot(pos.x - striker.x, pos.y - striker.y) < striker.radius * 2.5) {
            e.preventDefault();
            striker.dragging = true;
            dragStart = { x: striker.x, y: striker.y };
            dragCurrent = pos;
        }
    }

    function moveDrag(e) {
        if(!striker.dragging) return;
        e.preventDefault();
        const pos = getPos(e);
        const baselineY = (turn === 'P1') ? canvas.height - (90 * SCALE) : (90 * SCALE);

        const vertDist = Math.abs(pos.y - baselineY);
        
        if (vertDist < 40 * SCALE) {
            dragStart = null; 
            const margin = 65 * SCALE;
            striker.x = Math.max(margin, Math.min(canvas.width - margin, pos.x));
            striker.y = baselineY; 
        } else {
            if(!dragStart) dragStart = { x: striker.x, y: striker.y };
            dragCurrent = pos;
        }
    }

    function endDrag(e) {
        if(!striker.dragging) return;
        striker.dragging = false;

        if (dragStart && dragCurrent) {
            const dx = dragStart.x - dragCurrent.x;
            const dy = dragStart.y - dragCurrent.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 10 * SCALE) {
                const power = Math.min(dist * 0.15, MAX_POWER * SCALE);
                const angle = Math.atan2(dy, dx);
                shootStriker(power, angle);
            }
        }
        dragStart = null;
    }

    function shootStriker(power, angle) {
        sfx.strike();
        striker.vx = Math.cos(angle) * power;
        striker.vy = Math.sin(angle) * power;
        gameState = 'MOVING';
    }

    // --- Physics Engine ---
    function updatePhysics() {
        if(gameState !== 'MOVING') return;

        if (collisionCooldown > 0) collisionCooldown--;

        let totalKineticEnergy = 0;
        const allObjects = [...pieces];
        if (striker.visible) allObjects.push(striker);

        for(let step = 0; step < SUB_STEPS; step++) {
            allObjects.forEach(obj => {
                obj.x += obj.vx / SUB_STEPS;
                obj.y += obj.vy / SUB_STEPS;

                const r = obj.radius;
                const margin = 20 * SCALE;
                
                if(obj.x < margin + r) { obj.x = margin + r; obj.vx *= -WALL_DAMPING; }
                else if(obj.x > canvas.width - margin - r) { obj.x = canvas.width - margin - r; obj.vx *= -WALL_DAMPING; }
                if(obj.y < margin + r) { obj.y = margin + r; obj.vy *= -WALL_DAMPING; }
                else if(obj.y > canvas.height - margin - r) { obj.y = canvas.height - margin - r; obj.vy *= -WALL_DAMPING; }
            });

            for (let i = 0; i < allObjects.length; i++) {
                for (let j = i + 1; j < allObjects.length; j++) {
                    const p1 = allObjects[i], p2 = allObjects[j];
                    const dx = p2.x - p1.x, dy = p2.y - p1.y;
                    const distSq = dx*dx + dy*dy;
                    const minDist = p1.radius + p2.radius;

                    if (distSq < minDist * minDist) {
                        const dist = Math.sqrt(distSq) || 0.001;
                        const nx = dx / dist, ny = dy / dist;

                        const overlap = minDist - dist;
                        const totalMass = p1.mass + p2.mass;
                        p1.x -= nx * overlap * (p2.mass / totalMass);
                        p1.y -= ny * overlap * (p2.mass / totalMass);
                        p2.x += nx * overlap * (p1.mass / totalMass);
                        p2.y += ny * overlap * (p1.mass / totalMass);

                        const rvx = p2.vx - p1.vx, rvy = p2.vy - p1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal > 0) continue;

                        if (collisionCooldown === 0) {
                            sfx.hit(Math.hypot(rvx, rvy));
                            collisionCooldown = 5; // limit sound spam
                        }

                        let jVal = -(1 + 0.8) * velAlongNormal; 
                        jVal /= (1 / p1.mass + 1 / p2.mass);

                        p1.vx -= (jVal * nx) / p1.mass; p1.vy -= (jVal * ny) / p1.mass;
                        p2.vx += (jVal * nx) / p2.mass; p2.vy += (jVal * ny) / p2.mass;
                    }
                }
            }
        }

        allObjects.forEach(obj => {
            obj.vx *= FRICTION; obj.vy *= FRICTION;
            if(Math.abs(obj.vx) < 0.05) obj.vx = 0;
            if(Math.abs(obj.vy) < 0.05) obj.vy = 0;
            totalKineticEnergy += Math.abs(obj.vx) + Math.abs(obj.vy);
        });

        checkPockets();

        if (totalKineticEnergy === 0) handleTurnEnd();
    }

    // --- Pocket Logic ---
    let pocketedColor = null;

    function checkPockets() {
        const pockets = [
            {x: 25*SCALE, y: 25*SCALE}, {x: canvas.width - 25*SCALE, y: 25*SCALE},
            {x: 25*SCALE, y: canvas.height - 25*SCALE}, {x: canvas.width - 25*SCALE, y: canvas.height - 25*SCALE}
        ];
        
        if (striker.visible) {
            pockets.forEach(p => {
                if (Math.hypot(striker.x - p.x, striker.y - p.y) < POCKET_RADIUS * SCALE) {
                    sfx.foul();
                    striker.visible = false;
                    striker.vx = 0; striker.vy = 0;
                    foulCommitted = true;
                    showMsg("FOUL!", "#ff4444");
                }
            });
        }

        for (let i = pieces.length - 1; i >= 0; i--) {
            const pc = pieces[i];
            let fell = false;
            pockets.forEach(p => { if (Math.hypot(pc.x - p.x, pc.y - p.y) < POCKET_RADIUS * SCALE) fell = true; });

            if (fell) {
                sfx.pocket();
                pocketedColor = pc.type;
                
                if (pc.type === 'red') {
                    scores[turn === 'P1' ? 'p1' : 'p2'] += 50;
                    showMsg("QUEEN!", "#d93025");
                } else if (pc.type === 'white') {
                    if (turn === 'P1') { scores.p1 += 10; showMsg("Nice!", "#ffd700"); }
                    else { scores.p2 += 10; } 
                } else if (pc.type === 'black') {
                    if (turn === 'P2') { scores.p2 += 10; showMsg("Nice!", "#ffd700"); }
                    else { scores.p1 += 10; } 
                }
                pieces.splice(i, 1);
            }
        }
    }

    function handleTurnEnd() {
        let nextTurn = (turn === 'P1') ? 'P2' : 'P1';
        
        if (!foulCommitted && pocketedColor) {
            if (turn === 'P1' && (pocketedColor === 'white' || pocketedColor === 'red')) nextTurn = 'P1';
            else if (turn === 'P2' && (pocketedColor === 'black' || pocketedColor === 'red')) nextTurn = 'P2';
        }

        pocketedColor = null;
        foulCommitted = false;
        
        const whites = pieces.filter(p => p.type === 'white').length;
        const blacks = pieces.filter(p => p.type === 'black').length;
        const reds = pieces.filter(p => p.type === 'red').length;

        if (whites === 0 && reds === 0) endGame("Player 1 Wins!");
        else if (blacks === 0 && reds === 0) endGame(gameMode==='CPU' ? "CPU Wins!" : "Player 2 Wins!");
        else {
            turn = nextTurn;
            resetStriker();
        }
    }

    // --- CPU AI ---
    function cpuTurn() {
        if (turn !== 'P2' || gameState !== 'AIMING' || gameMode !== 'CPU') return;

        const validTargets = pieces.filter(p => p.type === 'black' || p.type === 'red');
        let target = validTargets[Math.floor(Math.random() * validTargets.length)] || pieces[0];

        if (target) {
            const margin = 70 * SCALE;
            let idealX = target.x + (Math.random() * 40 - 20);
            striker.x = Math.max(margin, Math.min(canvas.width - margin, idealX));
            
            const dx = target.x - striker.x, dy = target.y - striker.y;
            const dist = Math.hypot(dx, dy);
            let power = Math.min((dist * 0.08) + 15, MAX_POWER);
            
            shootStriker(power * SCALE, Math.atan2(dy, dx));
        } else {
            shootStriker(20 * SCALE, Math.PI/2);
        }
    }

    // --- Rendering ---
    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        drawCarromBoard();

        if (gameState === 'AIMING' && striker.dragging && dragStart && dragCurrent) {
            const dx = dragStart.x - dragCurrent.x, dy = dragStart.y - dragCurrent.y;
            ctx.beginPath(); ctx.moveTo(striker.x, striker.y);
            ctx.lineTo(striker.x + dx * 2.5, striker.y + dy * 2.5);
            ctx.strokeStyle = (turn === 'P1') ? COLORS.aimP1 : COLORS.aimP2; 
            ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.setLineDash([10, 10]); ctx.stroke(); ctx.setLineDash([]);
        }

        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;

        pieces.forEach(drawPiece);
        if (striker.visible) {
            drawPiece(striker);
            if (gameState === 'AIMING') {
                ctx.beginPath(); ctx.arc(striker.x, striker.y, striker.radius + 6, 0, Math.PI*2);
                ctx.strokeStyle = (turn === 'P1') ? COLORS.aimP1 : COLORS.aimP2;
                ctx.lineWidth = 3; ctx.stroke();
            }
        }
        ctx.shadowColor = 'transparent';
    }

    function drawCarromBoard() {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const w = canvas.width, h = canvas.height;
        const pr = POCKET_RADIUS * SCALE, margin = 25 * SCALE;

        ctx.fillStyle = COLORS.pocket;
        [[margin, margin], [w-margin, margin], [margin, h-margin], [w-margin, h-margin]].forEach(([px, py]) => {
            ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#2a1a0f'; ctx.lineWidth = 4; ctx.stroke();
            // Inner glow simulation
            ctx.beginPath(); ctx.arc(px, py, pr-2, 0, Math.PI*2); 
            ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 2; ctx.stroke();
        });

        // Center Design
        ctx.beginPath(); ctx.arc(cx, cy, 75 * SCALE, 0, Math.PI*2);
        ctx.strokeStyle = COLORS.lines; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.beginPath(); ctx.strokeStyle = '#d93025'; ctx.lineWidth = 2;
        for(let i=0; i<8; i++){
            const a = i * 45 * Math.PI/180;
            ctx.moveTo(cx, cy);
            ctx.quadraticCurveTo(cx + Math.cos(a+0.3)*40*SCALE, cy + Math.sin(a+0.3)*40*SCALE, cx + Math.cos(a)*75*SCALE, cy + Math.sin(a)*75*SCALE);
        }
        ctx.stroke();
        
        // Center Star
        ctx.fillStyle = '#d93025';
        ctx.beginPath(); ctx.arc(cx, cy, 8*SCALE, 0, Math.PI*2); ctx.fill();

        // Baselines
        const lineOffset = 90 * SCALE, sideMargin = 60 * SCALE;
        drawBaseline(sideMargin, lineOffset, w - sideMargin, lineOffset); 
        drawBaseline(sideMargin, h - lineOffset, w - sideMargin, h - lineOffset); 
        
        ctx.strokeStyle = COLORS.lines; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(lineOffset, sideMargin); ctx.lineTo(lineOffset, h - sideMargin); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w - lineOffset, sideMargin); ctx.lineTo(w - lineOffset, h - sideMargin); ctx.stroke();

        drawArrow(cx, cy, margin + pr, margin + pr);
        drawArrow(cx, cy, w - margin - pr, margin + pr);
        drawArrow(cx, cy, margin + pr, h - margin - pr);
        drawArrow(cx, cy, w - margin - pr, h - margin - pr);
    }

    function drawBaseline(x1, y1, x2, y2) {
        ctx.strokeStyle = COLORS.lines; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x1, y1 - 25*SCALE); ctx.lineTo(x2, y2 - 25*SCALE); 
        if (y1 > canvas.height/2) { ctx.beginPath(); ctx.moveTo(x1, y1 + 25*SCALE); ctx.lineTo(x2, y2 + 25*SCALE); }
        ctx.stroke();
        const r = 10 * SCALE;
        ctx.fillStyle = '#d93025';
        ctx.beginPath(); ctx.arc(x1, y1, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(x2, y2, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    }

    function drawArrow(cx, cy, px, py) {
        const angle = Math.atan2(py - cy, px - cx), dist = 140 * SCALE;
        const startX = px - Math.cos(angle) * dist, startY = py - Math.sin(angle) * dist;
        ctx.strokeStyle = COLORS.lines; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(startX, startY);
        ctx.lineTo(px - Math.cos(angle)*50*SCALE, py - Math.sin(angle)*50*SCALE);
        ctx.stroke();
    }

    function drawPiece(p) {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        
        let color1, color2;
        if (p.isStriker) { color1 = '#fffbe0'; color2 = '#e6c300'; }
        else if (p.type === 'white') { color1 = '#ffffff'; color2 = '#c0c0c0'; }
        else if (p.type === 'black') { color1 = '#555555'; color2 = '#111111'; }
        else { color1 = '#ff6b6b'; color2 = '#b5151b'; }

        try {
            const g = ctx.createRadialGradient(p.x - p.radius/3, p.y - p.radius/3, p.radius/10, p.x, p.y, p.radius);
            g.addColorStop(0, color1); g.addColorStop(1, color2);
            ctx.fillStyle = g;
        } catch (e) { ctx.fillStyle = color2; }

        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2; ctx.stroke();
        // Inner highlight for 3D effect
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius * 0.7, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();
    }

    function showMsg(txt, col) {
        msgEl.innerText = txt;
        msgEl.style.borderColor = col;
        msgEl.style.color = col;
        msgEl.style.opacity = 1;
        msgEl.style.transform = "translate(-50%, -50%) scale(1.15)";
        setTimeout(() => {
            msgEl.style.opacity = 0;
            msgEl.style.transform = "translate(-50%, -50%) scale(0.9)";
        }, 1500);
    }

    function updateUI() {
        document.getElementById('p1-badge').className = turn === 'P1' ? 'player-badge active' : 'player-badge';
        document.getElementById('p2-badge').className = turn === 'P2' ? 'player-badge active' : 'player-badge';
        document.getElementById('score-p1').innerText = scores.p1;
        document.getElementById('score-p2').innerText = scores.p2;
    }

    function endGame(txt) {
        sfx.win();
        gameState = 'END';
        document.getElementById('end-title').innerText = txt;
        document.getElementById('end-title').style.display = 'block';
        document.getElementById('menu-overlay').style.display = 'flex';
    }

    function gameLoop() {
        if (gameState !== 'END') {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }
    
    // Boot
    resize();
    draw();

</script>
</body>
</html>
